name: Create Release

on:
  push:
    branches: [main]
    paths:
      - "custom_components/weglide/manifest.json"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v1.1.4)"
        required: true
        default: "v1.1.4"
      body:
        description: "Release notes"
        required: true
        default: |
          **Bugfix:** Am-Fliegen-Sensor blieb immer Aus, obwohl der Pilot flog.
          Aktive Flüge haben keine scoring_date — der bisherige Filter schloss sie komplett aus. Fix: Abfrage jetzt per order_by=-takeoff_time + Prüfung auf heutiges takeoff_time-Datum.

          **CI:** translations/en.json hinzugefügt (Hassfest), codeowner und render_readme in hacs.json/manifest.json ergänzt.

          **Upgrade:** Integration in Home Assistant neu laden.

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        if: github.event_name == 'push'
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/weglide/manifest.json'))['version'])")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Release (auto on push)
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.version.outputs.tag }}";
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: [
                  "**Bugfix:** Am-Fliegen-Sensor blieb immer Aus, obwohl der Pilot flog.",
                  "Aktive Flüge haben keine scoring_date — der bisherige Filter schloss sie komplett aus. Fix: Abfrage jetzt per order_by=-takeoff_time + Prüfung auf heutiges takeoff_time-Datum.",
                  "",
                  "**CI:** translations/en.json hinzugefügt (Hassfest), codeowner und render_readme in hacs.json/manifest.json ergänzt.",
                  "",
                  "**Upgrade:** Integration in Home Assistant neu laden.",
                ].join("\n"),
                draft: false,
                prerelease: false,
                target_commitish: context.sha,
              });
              core.info(`Release ${tag} created.`);
            } catch (e) {
              if (e.status === 422) {
                core.info(`Release ${tag} already exists — skipping.`);
              } else {
                throw e;
              }
            }

      - name: Create Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ github.event.inputs.tag }}";
            const body = `${{ github.event.inputs.body }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });
            core.info(`Release ${tag} created.`);
