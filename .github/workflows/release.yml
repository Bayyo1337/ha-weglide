name: Create Release

on:
  push:
    branches: [main]
    paths:
      - "custom_components/weglide/manifest.json"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v1.2.0)"
        required: true
        default: "v1.2.0"
      body:
        description: "Release notes"
        required: true
        default: |
          **Bugfix:** CI-Checks (Hassfest, HACS) repariert.
          **Upgrade:** Integration in Home Assistant neu laden.

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        if: github.event_name == 'push'
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/weglide/manifest.json'))['version'])")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Read changelog from manifest version
        if: github.event_name == 'push'
        id: notes
        run: echo "body=Release v$(python3 -c \"import json; print(json.load(open('custom_components/weglide/manifest.json'))['version'])\")" >> "$GITHUB_OUTPUT"

      - name: Create Release (auto on push)
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.version.outputs.tag }}";
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: "${{ steps.notes.outputs.body }}",
                draft: false,
                prerelease: false,
                target_commitish: context.sha,
              });
              core.info(`Release ${tag} created.`);
            } catch (e) {
              if (e.status === 422) {
                core.info(`Release ${tag} already exists — skipping.`);
              } else {
                throw e;
              }
            }

      - name: Create Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ github.event.inputs.tag }}";
            const body = `${{ github.event.inputs.body }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });
            core.info(`Release ${tag} created.`);
