name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v1.1.4)"
        required: true
        default: "v1.1.4"
      body:
        description: "Release notes"
        required: true
        default: |
          **Bugfix:** Am-Fliegen-Sensor blieb immer Aus, obwohl der Pilot flog.
          Aktive Flüge haben keine scoring_date — der bisherige Filter schloss sie komplett aus. Fix: Abfrage jetzt per order_by=-takeoff_time + Prüfung auf heutiges takeoff_time-Datum.

          **CI:** translations/en.json hinzugefügt (Hassfest), codeowner und render_readme in hacs.json/manifest.json ergänzt.

          **Upgrade:** Integration in Home Assistant neu laden.

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ github.event.inputs.tag }}";
            const body = `${{ github.event.inputs.body }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });
            core.info(`Release ${tag} created.`);
